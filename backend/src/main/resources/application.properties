# ─────────────────────────────────────────
# Server
# ─────────────────────────────────────────
server.port=8080

# ─────────────────────────────────────────
# Database — MySQL
# ─────────────────────────────────────────
spring.datasource.url=jdbc:mysql://localhost:3306/coinart_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=Ganesh@123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ─────────────────────────────────────────
# JPA / Hibernate
# ─────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# ─────────────────────────────────────────
# JWT
# ─────────────────────────────────────────
jwt.secret=coinart-super-secret-key-for-jwt-signing-must-be-at-least-256-bits-long
jwt.expiration=86400000

# ─────────────────────────────────────────
# Logging
# ─────────────────────────────────────────
logging.level.com.coinart=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN
spring.jpa.open-in-view=false
